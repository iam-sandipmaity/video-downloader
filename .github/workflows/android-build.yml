name: Android Build

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    outputs:
      version_name: ${{ steps.version.outputs.version_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Read version from gradle.properties
        id: version
        run: |
          VERSION=$(grep '^APP_VERSION_NAME=' gradle.properties | cut -d'=' -f2)
          echo "version_name=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Prepare signing files
        shell: bash
        env:
          INTERNAL_DEBUG_KEYSTORE_BASE64: ${{ secrets.INTERNAL_DEBUG_KEYSTORE_BASE64 }}
          INTERNAL_DEBUG_STORE_PASSWORD: ${{ secrets.INTERNAL_DEBUG_STORE_PASSWORD }}
          INTERNAL_DEBUG_KEY_ALIAS: ${{ secrets.INTERNAL_DEBUG_KEY_ALIAS }}
          INTERNAL_DEBUG_KEY_PASSWORD: ${{ secrets.INTERNAL_DEBUG_KEY_PASSWORD }}
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          if [ -n "$INTERNAL_DEBUG_KEYSTORE_BASE64" ]; then
            echo "$INTERNAL_DEBUG_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/internal-debug.jks"
            echo "INTERNAL_DEBUG_STORE_FILE=$RUNNER_TEMP/internal-debug.jks" >> "$GITHUB_ENV"
            echo "INTERNAL_DEBUG_STORE_PASSWORD=$INTERNAL_DEBUG_STORE_PASSWORD" >> "$GITHUB_ENV"
            echo "INTERNAL_DEBUG_KEY_ALIAS=$INTERNAL_DEBUG_KEY_ALIAS" >> "$GITHUB_ENV"
            echo "INTERNAL_DEBUG_KEY_PASSWORD=$INTERNAL_DEBUG_KEY_PASSWORD" >> "$GITHUB_ENV"
          fi

          if [ -n "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "$RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.jks"
            echo "RELEASE_STORE_FILE=$RUNNER_TEMP/release.jks" >> "$GITHUB_ENV"
            echo "RELEASE_STORE_PASSWORD=$RELEASE_STORE_PASSWORD" >> "$GITHUB_ENV"
            echo "RELEASE_KEY_ALIAS=$RELEASE_KEY_ALIAS" >> "$GITHUB_ENV"
            echo "RELEASE_KEY_PASSWORD=$RELEASE_KEY_PASSWORD" >> "$GITHUB_ENV"
          fi

      - name: Verify bundled ffmpeg binary exists (blocking)
        run: |
          required_ffmpeg="app/src/main/assets/ffmpeg/arm64-v8a/ffmpeg"

          if [ ! -f "$required_ffmpeg" ]; then
            echo "::error::Missing required bundled ffmpeg binary."
            echo "Required files:"
            echo "  $required_ffmpeg"
            echo "Detected files under app/src/main/assets/ffmpeg:"
            find app/src/main/assets/ffmpeg -type f 2>/dev/null || true
            exit 1
          fi

      - name: Build debug APK
        run: gradle :app:assembleDebug

      - name: Rename APK
        run: |
          VERSION="${{ steps.version.outputs.version_name }}"
          mv app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/video-downloader-v${VERSION}-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: video-downloader-v${{ steps.version.outputs.version_name }}-debug
          path: app/build/outputs/apk/debug/video-downloader-*.apk

  release-nightly:
    if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download debug APK artifact
        uses: actions/download-artifact@v4
        with:
          name: video-downloader-v${{ needs.build.outputs.version_name }}-debug
          path: dist

      - name: Create nightly GitHub prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly-${{ github.run_number }}
          name: "Nightly Build #${{ github.run_number }} (v${{ needs.build.outputs.version_name }})"
          target_commitish: ${{ github.sha }}
          prerelease: true
          generate_release_notes: true
          files: dist/*.apk

  release-tag:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Read version from gradle.properties
        id: version
        run: |
          VERSION=$(grep '^APP_VERSION_NAME=' gradle.properties | cut -d'=' -f2)
          echo "version_name=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Prepare release signing files
        shell: bash
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          if [ -z "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "::error::Missing release signing secrets. Tagged releases must use the stable release keystore."
            exit 1
          fi

          echo "$RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.jks"
          echo "RELEASE_STORE_FILE=$RUNNER_TEMP/release.jks" >> "$GITHUB_ENV"
          echo "RELEASE_STORE_PASSWORD=$RELEASE_STORE_PASSWORD" >> "$GITHUB_ENV"
          echo "RELEASE_KEY_ALIAS=$RELEASE_KEY_ALIAS" >> "$GITHUB_ENV"
          echo "RELEASE_KEY_PASSWORD=$RELEASE_KEY_PASSWORD" >> "$GITHUB_ENV"

      - name: Build release APK
        run: gradle :app:assembleRelease

      - name: Rename release APK
        run: |
          VERSION="${{ steps.version.outputs.version_name }}"
          mv app/build/outputs/apk/release/app-release-unsigned.apk \
             app/build/outputs/apk/release/video-downloader-v${VERSION}.apk 2>/dev/null || \
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/video-downloader-v${VERSION}.apk 2>/dev/null || true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: "Video Downloader v${{ steps.version.outputs.version_name }}"
          generate_release_notes: true
          files: app/build/outputs/apk/release/video-downloader-*.apk
