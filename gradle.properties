org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8
org.gradle.parallel=true
org.gradle.caching=true
android.useAndroidX=true
android.enableJetifier=true
kotlin.code.style=official
kotlin.incremental=true
android.suppressUnsupportedCompileSdk=35

# ── App version ────────────────────────────────────────────────────────────────
# Bump these manually before tagging a release.
# versionCode must be a positive integer, incremented with every release.
# versionName is shown in the APK filename: video-downloader-v<versionName>.apk
APP_VERSION_CODE=1
APP_VERSION_NAME=1.1.0
